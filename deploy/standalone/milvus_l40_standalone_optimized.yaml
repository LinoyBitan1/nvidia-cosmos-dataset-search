# Milvus Configuration - L40 GPU Standalone Optimized for Bulk Indexing
# Version: 2.4.4-gpu
# System: Single L40 48GB GPU, optimized for 256-dim embeddings with GPU_CAGRA
# Key optimizations:
# - buildParallel=1 (CUVS team finding)
# - 1GB segments for optimal GPU indexing
# - High data node concurrency for bulk import
# - Aggressive memory settings for L40's 48GB VRAM

# ============================================================================
# Storage Backends
# ============================================================================

etcd:
  endpoints: etcd:2379
  rootPath: by-dev
  metaSubPath: meta
  kvSubPath: kv
  log:
    level: info
    path: stdout
  requestTimeout: 10000
  use:
    embed: false
  auth:
    enabled: false

metastore:
  type: etcd
  snapshot:
    ttl: 86400
    reserveTime: 3600

localStorage:
  path: /var/lib/milvus/data/

# S3/LocalStack configuration for bulk insert
minio:
  address: localstack
  port: 4566
  accessKeyID: test
  secretAccessKey: test
  useSSL: false
  bucketName: cosmos-test-bucket
  region: us-east-1
  logLevel: fatal
  useVirtualHost: false
  rootPath: files
  useIAM: false
  cloudProvider: aws
  requestTimeoutMs: 60000  # 60s timeout for large bulk files
  listObjectsMaxKeys: 0

# Message queue - using RocksMQ for standalone
rocksmq:
  path: /var/lib/milvus/rdb_data
  lrucacheratio: 0.06
  rocksmqPageSize: 67108864
  retentionTimeInMinutes: 4320
  retentionSizeInMB: 8192
  compactionInterval: 86400
  compressionTypes: 0,0,7,7,7

mq:
  type: default
  enablePursuitMode: true
  pursuitLag: 10
  pursuitBufferSize: 8388608
  pursuitBufferTime: 60
  mqBufSize: 16
  dispatcher:
    mergeCheckInterval: 1
    targetBufSize: 16
    maxTolerantLag: 3

# ============================================================================
# Root Coordinator
# ============================================================================

rootCoord:
  dmlChannelNum: 16
  maxPartitionNum: 1024
  minSegmentSizeToEnableIndex: 1024
  enableActiveStandby: false
  maxDatabaseNum: 64
  maxGeneralCapacity: 65536
  gracefulStopTimeout: 5
  port: 53100
  grpc:
    serverMaxSendSize: 536870912
    serverMaxRecvSize: 268435456
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 536870912

# ============================================================================
# Proxy
# ============================================================================

proxy:
  timeTickInterval: 200
  healthCheckTimeout: 3000
  msgStream:
    timeTick:
      bufSize: 512
  maxNameLength: 255
  maxFieldNum: 64
  maxVectorFieldNum: 4
  maxShardNum: 16
  maxDimension: 32768
  ginLogging: true
  ginLogSkipPaths: /
  maxTaskNum: 2048  # Increased for bulk operations
  ddlConcurrency: 16
  dclConcurrency: 16
  mustUsePartitionKey: false
  maxConnectionNum: 10000
  gracefulStopTimeout: 30
  slowQuerySpanInSeconds: 5
  queryNodePooling:
    size: 10
  http:
    enabled: true
    debug_mode: false
    enablePprof: true
    acceptTypeAllowInt64: true
  port: 19530
  internalPort: 19529
  grpc:
    serverMaxSendSize: 268435456
    serverMaxRecvSize: 67108864
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 67108864

# ============================================================================
# Query Coordinator
# ============================================================================

queryCoord:
  taskMergeCap: 1
  taskExecutionCap: 512  # Increased for better parallelism
  autoHandoff: true
  autoBalance: true
  autoBalanceChannel: true
  balancer: ScoreBasedBalancer
  globalRowCountFactor: 0.1
  scoreUnbalanceTolerationFactor: 0.05
  reverseUnBalanceTolerationFactor: 1.3
  overloadedMemoryThresholdPercentage: 90
  balanceIntervalSeconds: 60
  memoryUsageMaxDifferencePercentage: 30
  rowCountFactor: 0.4
  segmentCountFactor: 0.4
  globalSegmentCountFactor: 0.1
  collectionChannelCountFactor: 10
  segmentCountMaxSteps: 50
  rowCountMaxSteps: 50
  randomMaxSteps: 10
  growingRowCountWeight: 4
  delegatorMemoryOverloadFactor: 0.1
  balanceCostThreshold: 0.001
  observerTaskParallel: 16
  checkInterval: 1000
  checkBalanceInterval: 3000
  checkSegmentInterval: 1000
  checkChannelInterval: 1000
  checkIndexInterval: 10000
  checkHealthInterval: 3000
  checkHealthRPCTimeout: 2000
  checkHandoffInterval: 5000
  checkAutoBalanceConfigInterval: 10
  checkNodeSessionInterval: 60
  checkExecutedFlagInterval: 100
  updateCollectionLoadStatusInterval: 5
  cleanExcludeSegmentInterval: 60
  channelTaskTimeout: 60000
  segmentTaskTimeout: 120000
  distPullInterval: 500
  distRequestTimeout: 5000
  heartbeatAvailableInterval: 10000
  heatbeatWarningLag: 5000
  loadTimeoutSeconds: 600
  collectionRecoverTimes: 3
  collectionObserverInterval: 200
  enableActiveStandby: false
  enableStoppingBalance: true
  channelExclusiveNodeFactor: 4
  gracefulStopTimeout: 5
  brokerTimeout: 5000
  port: 19531
  grpc:
    serverMaxSendSize: 536870912
    serverMaxRecvSize: 268435456
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 536870912

# ============================================================================
# CRITICAL: Index Node - Single L40 GPU Optimization
# ============================================================================

indexNode:
  scheduler:
    buildParallel: 2  # Testing higher parallelism for max GPU utilization
  enableDisk: false  # Pure GPU indexing for best performance
  maxDiskUsagePercentage: 95
  port: 21121
  grpc:
    serverMaxSendSize: 536870912
    serverMaxRecvSize: 268435456
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 536870912

indexCoord:
  bindIndexNodeMode:
    enable: false
    address: localhost:22930
    withCred: false
    nodeID: 0
  segment:
    minSegmentNumRowsToEnableIndex: 1024

# ============================================================================
# Query Node - Optimized for concurrent queries during bulk indexing
# ============================================================================

queryNode:
  stats:
    publishInterval: 1000
  segcore:
    knowhereThreadPoolNumRatio: 4
    chunkRows: 128
    interimIndex:
      enableIndex: true
      nlist: 128
      nprobe: 16
      memExpansionRate: 1.15
      buildParallelRate: 0.5
    knowhereScoreConsistency: false
    multipleChunkedEnable: true
  loadMemoryUsageFactor: 1
  enableDisk: false  # Keep GPU-accelerated queries
  maxDiskUsagePercentage: 95
  cache:
    memoryLimit: 2147483648  # 2GB cache
    readAheadPolicy: willneed
  mmap:
    vectorField: false  # Don't use mmap for GPU queries
    vectorIndex: false
    scalarField: false
    scalarIndex: false
    growingMmapEnabled: false
    fixedFileSizeForMmapAlloc: 1
    maxDiskUsagePercentageForMmapAlloc: 50
  lazyload:
    enabled: false
    waitTimeout: 30000
    requestResourceTimeout: 5000
    requestResourceRetryInterval: 2000
    maxRetryTimes: 1
    maxEvictPerRetry: 1
  indexOffsetCacheEnabled: false
  grouping:
    enabled: true
    maxNQ: 1000
    topKMergeRatio: 20
  scheduler:
    receiveChanSize: 10240
    unsolvedQueueSize: 10240
    maxReadConcurrentRatio: 1
    cpuRatio: 10
    maxTimestampLag: 86400
    scheduleReadPolicy:
      name: fifo
      taskQueueExpire: 60
      enableCrossUserGrouping: false
      maxPendingTaskPerUser: 1024
  dataSync:
    flowGraph:
      maxQueueLength: 16
      maxParallelism: 1024
  enableSegmentPrune: false
  levelZeroForwardPolicy: FilterByBF
  streamingDeltaForwardPolicy: FilterByBF
  queryStreamBatchSize: 4194304
  queryStreamMaxBatchSize: 134217728
  bloomFilterApplyParallelFactor: 4
  workerPooling:
    size: 10
  port: 21123
  grpc:
    serverMaxSendSize: 536870912
    serverMaxRecvSize: 268435456
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 536870912

# ============================================================================
# CRITICAL: Data Coordinator - Bulk Insert Optimized
# ============================================================================

dataCoord:
  channel:
    watchTimeoutInterval: 300
    legacyVersionWithoutRPCWatch: 2.4.1
    balanceSilentDuration: 300
    balanceInterval: 360
    checkInterval: 1
    notifyChannelOperationTimeout: 5
    maxConcurrentChannelTaskNumPerDN: 32
  segment:
    maxSize: 2048  # CRITICAL: 2GB segments - Optimized for 100% GPU utilization
    diskSegmentMaxSize: 4096
    sealProportion: 0.12
    sealProportionJitter: 0.1
    assignmentExpiration: 2000
    allocLatestExpireAttempt: 200
    maxLife: 86400
    maxIdleTime: 600
    minSizeFromIdleToSealed: 16
    maxBinlogFileNumber: 32
    smallProportion: 0.5
    compactableProportion: 0.85
    expansionRate: 1.25
  segmentFlushInterval: 2
  sealPolicy:
    channel:
      growingSegmentsMemSize: 4096
  autoUpgradeSegmentIndex: false
  enableCompaction: true
  compaction:
    enableAutoCompaction: true
    indexBasedCompaction: true
    taskPrioritizer: default
    taskQueueCapacity: 100000
    rpcTimeout: 10
    maxParallelTaskNum: 10
    dropTolerance: 86400
    gcInterval: 1800
    levelzero:
      triggerInterval: 10
      forceTrigger:
        minSize: 8388608
        maxSize: 67108864
        deltalogMinNum: 10
        deltalogMaxNum: 30
    mix:
      triggerInterval: 60
    single:
      ratio:
        threshold: 0.2
      deltalog:
        maxsize: 16777216
        maxnum: 200
      expiredlog:
        maxsize: 10485760
    clustering:
      enable: true
      autoEnable: false
      triggerInterval: 600
      minInterval: 3600
      maxInterval: 259200
      newDataSizeThreshold: 512m
      preferSegmentSizeRatio: 0.8
      maxSegmentSizeRatio: 1
      maxTrainSizeRatio: 0.8
      maxCentroidsNum: 10240
      minCentroidsNum: 16
      minClusterSizeRatio: 0.01
      maxClusterSizeRatio: 10
      maxClusterSize: 5g
  enableGarbageCollection: true
  gc:
    interval: 3600
    missingTolerance: 86400
    dropTolerance: 10800
    removeConcurrent: 32
    scanInterval: 168
  enableActiveStandby: false
  brokerTimeout: 5000
  autoBalance: true
  checkAutoBalanceConfigInterval: 10
  import:
    filesPerPreImportTask: 4  # Increased for better parallelization
    taskRetention: 10800
    maxSizeInMBPerImportTask: 10240  # 10GB per task (matches 10M vector file)
    scheduleInterval: 2  # Check every 2s
    checkIntervalHigh: 2
    checkIntervalLow: 120
    maxImportFileNumPerReq: 2048  # Increased for larger batches
    maxImportJobNum: 1024
    waitForIndex: true  # CRITICAL: Wait for index completion
  index:
    memSizeEstimateMultiplier: 2
  gracefulStopTimeout: 5
  port: 13333
  grpc:
    serverMaxSendSize: 536870912
    serverMaxRecvSize: 268435456
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 536870912
  syncSegmentsInterval: 300
  slot:
    clusteringCompactionUsage: 16
    mixCompactionUsage: 8
    l0DeleteCompactionUsage: 8

# ============================================================================
# CRITICAL: Data Node - High Throughput Configuration
# ============================================================================

dataNode:
  dataSync:
    flowGraph:
      maxQueueLength: 16
      maxParallelism: 1024
    maxParallelSyncMgrTasks: 256
    skipMode:
      enable: true
      skipNum: 4
      coldTime: 60
  segment:
    insertBufSize: 16777216  # 16MB buffer
    deleteBufBytes: 16777216
    syncPeriod: 600
  memory:
    forceSyncEnable: true
    forceSyncSegmentNum: 1
    checkInterval: 3000
    forceSyncWatermark: 0.5
  timetick:
    interval: 500
  channel:
    workPoolSize: -1  # Auto-size based on CPU
    updateChannelCheckpointMaxParallel: 10
    updateChannelCheckpointInterval: 60
    updateChannelCheckpointRPCTimeout: 20
    maxChannelCheckpointsPerPRC: 128
    channelCheckpointUpdateTickInSeconds: 10
  import:
    maxConcurrentTaskNum: 16  # Moderate concurrency
    maxImportFileSizeInGB: 16
    maxTaskSlotNum: 16
    readBufferSizeInMB: 16
  compaction:
    levelZeroBatchMemoryRatio: 0.5
    levelZeroMaxBatchSize: -1
    useMergeSort: false
    maxSegmentMergeSort: 30
  clusteringCompaction:
    memoryBufferRatio: 0.3
    workPoolSize: 8
  bloomFilterApplyParallelFactor: 4
  storage:
    deltalog: json
  gracefulStopTimeout: 1800
  port: 21124
  grpc:
    serverMaxSendSize: 536870912
    serverMaxRecvSize: 268435456
    clientMaxSendSize: 268435456
    clientMaxRecvSize: 536870912
  slot:
    slotCap: 16

# ============================================================================
# Logging
# ============================================================================

log:
  level: info
  file:
    rootPath: ""
    maxSize: 300
    maxAge: 10
    maxBackups: 20
  format: text
  stdout: true

grpc:
  log:
    level: WARNING
  gracefulStopTimeout: 10
  client:
    compressionEnabled: false
    dialTimeout: 200
    keepAliveTime: 10000
    keepAliveTimeout: 20000
    maxMaxAttempts: 10
    initialBackoff: 0.2
    maxBackoff: 10
    backoffMultiplier: 2
    minResetInterval: 1000
    maxCancelError: 32
    minSessionCheckInterval: 200

tls:
  serverPemPath: configs/cert/server.pem
  serverKeyPath: configs/cert/server.key
  caPemPath: configs/cert/ca.pem

internaltls:
  serverPemPath: configs/cert/server.pem
  serverKeyPath: configs/cert/server.key
  caPemPath: configs/cert/ca.pem
  sni: localhost

# ============================================================================
# Common Settings
# ============================================================================

common:
  defaultPartitionName: _default
  defaultIndexName: _default_idx
  entityExpiration: -1
  indexSliceSize: 16
  threadCoreCoefficient:
    highPriority: 10
    middlePriority: 5
    lowPriority: 1
  buildIndexThreadPoolRatio: 0.75
  DiskIndex:
    MaxDegree: 56
    SearchListSize: 100
    PQCodeBudgetGBRatio: 0.125
    BuildNumThreadsRatio: 1
    SearchCacheBudgetGBRatio: 0.1
    LoadNumThreadRatio: 8
    BeamWidthRatio: 4
  gracefulTime: 5000
  gracefulStopTimeout: 1800
  storageType: remote
  simdType: auto
  security:
    authorizationEnabled: false
    internaltlsEnabled: false
    tlsMode: 0
    defaultRootPassword: Milvus
    superUsers: null
    rbac:
      overrideBuiltInPrivilegeGroups:
        enabled: false
      cluster:
        readonly:
          privileges: ListDatabases,SelectOwnership,SelectUser,DescribeResourceGroup,ListResourceGroups,ListPrivilegeGroups
        readwrite:
          privileges: ListDatabases,SelectOwnership,SelectUser,DescribeResourceGroup,ListResourceGroups,ListPrivilegeGroups,FlushAll,TransferNode,TransferReplica,UpdateResourceGroups
        admin:
          privileges: ListDatabases,SelectOwnership,SelectUser,DescribeResourceGroup,ListResourceGroups,ListPrivilegeGroups,FlushAll,TransferNode,TransferReplica,UpdateResourceGroups,BackupRBAC,RestoreRBAC,CreateDatabase,DropDatabase,CreateOwnership,DropOwnership,ManageOwnership,CreateResourceGroup,DropResourceGroup,UpdateUser,RenameCollection,CreatePrivilegeGroup,DropPrivilegeGroup,OperatePrivilegeGroup
      database:
        readonly:
          privileges: ShowCollections,DescribeDatabase
        readwrite:
          privileges: ShowCollections,DescribeDatabase,AlterDatabase
        admin:
          privileges: ShowCollections,DescribeDatabase,AlterDatabase,CreateCollection,DropCollection
      collection:
        readonly:
          privileges: Query,Search,IndexDetail,GetFlushState,GetLoadState,GetLoadingProgress,HasPartition,ShowPartitions,DescribeCollection,DescribeAlias,GetStatistics,ListAliases
        readwrite:
          privileges: Query,Search,IndexDetail,GetFlushState,GetLoadState,GetLoadingProgress,HasPartition,ShowPartitions,DescribeCollection,DescribeAlias,GetStatistics,ListAliases,Load,Release,Insert,Delete,Upsert,Import,Flush,Compaction,LoadBalance,CreateIndex,DropIndex,CreatePartition,DropPartition
        admin:
          privileges: Query,Search,IndexDetail,GetFlushState,GetLoadState,GetLoadingProgress,HasPartition,ShowPartitions,DescribeCollection,DescribeAlias,GetStatistics,ListAliases,Load,Release,Insert,Delete,Upsert,Import,Flush,Compaction,LoadBalance,CreateIndex,DropIndex,CreatePartition,DropPartition,CreateAlias,DropAlias
  session:
    ttl: 30
    retryTimes: 30
  locks:
    metrics:
      enable: false
    threshold:
      info: 500
      warn: 1000
  storage:
    scheme: s3
    enablev2: false  # Storage v2 not supported for bulk import in 2.4.4
  ttMsgEnabled: true
  traceLogMode: 0
  bloomFilterSize: 100000
  bloomFilterType: BlockedBloomFilter
  maxBloomFalsePositive: 0.001
  bloomFilterApplyBatchSize: 1000
  collectionReplicateEnable: false
  usePartitionKeyAsClusteringKey: false
  useVectorAsClusteringKey: false
  localRPCEnabled: false
  sync:
    taskPoolReleaseTimeoutSeconds: 60

msgChannel:
  chanNamePrefix:
    cluster: by-dev
    rootCoordTimeTick: rootcoord-timetick
    rootCoordStatistics: rootcoord-statistics
    rootCoordDml: rootcoord-dml
    replicateMsg: replicate-msg
    queryTimeTick: queryTimeTick
    dataCoordTimeTick: datacoord-timetick-channel
    dataCoordSegmentInfo: segment-info-channel
  subNamePrefix:
    dataCoordSubNamePrefix: dataCoord
    dataNodeSubNamePrefix: dataNode

# ============================================================================
# CRITICAL: GPU Memory Pool - L40 Optimized (48GB VRAM)
# ============================================================================
# Strategy: Aggressive allocation maximizing Milvus GPU usage
# Total VRAM: 48GB
# Cosmos-embed NIM: 16GB (reserved)
# Available for Milvus: 32GB
# Allocation strategy:
#   - initMemSize: 16GB (50% of available) - Initial pool for startup
#   - maxMemSize: 30GB (94% of available) - Maximum pool, leaving 2GB buffer

gpu:
  initMemSize: 16384  # 16GB initial pool (50% of 32GB available)
  maxMemSize: 30720   # 30GB max pool (leaving 2GB buffer for dynamic allocation)

# ============================================================================
# Quota and Limits - Optimized for Bulk Ingestion
# ============================================================================

quotaAndLimits:
  enabled: true
  quotaCenterCollectInterval: 3
  limits:
    allocRetryTimes: 15
    allocWaitInterval: 1000
    complexDeleteLimitEnable: false
    maxCollectionNum: 65536
    maxCollectionNumPerDB: 65536
    maxInsertSize: -1  # No limit for bulk insert
    maxResourceGroupNumOfQueryNode: 1024
    maxGroupSize: 10
  ddl:
    enabled: false
    collectionRate: -1
    partitionRate: -1
    db:
      collectionRate: -1
      partitionRate: -1
  indexRate:
    enabled: false
    max: -1
    db:
      max: -1
  flushRate:
    enabled: true
    max: -1
    collection:
      max: 0.1
    db:
      max: -1
  compactionRate:
    enabled: false
    max: -1
    db:
      max: -1
  dml:
    enabled: false  # No DML throttling during bulk insert
    insertRate:
      max: -1
      db:
        max: -1
      collection:
        max: -1
      partition:
        max: -1
    deleteRate:
      max: -1
      db:
        max: -1
      collection:
        max: -1
      partition:
        max: -1
    upsertRate:
      max: -1
      db:
        max: -1
      collection:
        max: -1
      partition:
        max: -1
    bulkLoadRate:
      max: -1
      db:
        max: -1
      collection:
        max: -1
      partition:
        max: -1
  dql:
    enabled: false
    searchRate:
      max: -1
      db:
        max: -1
      collection:
        max: -1
      partition:
        max: -1
    queryRate:
      max: -1
      db:
        max: -1
      collection:
        max: -1
      partition:
        max: -1
  limitWriting:
    forceDeny: false
    ttProtection:
      enabled: false
      maxTimeTickDelay: 300
    memProtection:
      enabled: true
      dataNodeMemoryLowWaterLevel: 0.85
      dataNodeMemoryHighWaterLevel: 0.95
      queryNodeMemoryLowWaterLevel: 0.85
      queryNodeMemoryHighWaterLevel: 0.95
    diskProtection:
      enabled: true
      diskQuota: -1
      diskQuotaPerCollection: -1
      diskQuotaPerDB: -1
      diskQuotaPerPartition: -1
    growingSegmentsSizeProtection:
      enabled: false
      minRateRatio: 0.5
      lowWaterLevel: 0.2
      highWaterLevel: 0.4
    l0SegmentsRowCountProtection:
      enabled: false
      lowWaterLevel: 30000000
      highWaterLevel: 50000000
    deleteBufferRowCountProtection:
      enabled: false
      lowWaterLevel: 32768
      highWaterLevel: 65536
    deleteBufferSizeProtection:
      enabled: false
      lowWaterLevel: 134217728
      highWaterLevel: 268435456
  limitReading:
    forceDeny: false

trace:
  exporter: noop
  sampleFraction: 0
  initTimeoutSeconds: 10
  jaeger:
    url: null
  otlp:
    endpoint: null
    method: null
    secure: true

# ============================================================================
# Knowhere - Vector Search Engine Configuration
# ============================================================================

knowhere:
  enable: true
  DISKANN:
    build:
      max_degree: 56
      pq_code_budget_gb_ratio: 0.125
      search_cache_budget_gb_ratio: 0.1
      search_list_size: 100
    search:
      beam_width_ratio: 4

