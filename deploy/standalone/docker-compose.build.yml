# Docker Compose for Cosmos Video Dataset Search - Local Build Version
# This version builds images locally using Dockerfiles instead of pulling from NGC

services:
  # ================================================
  # Environment Validation (MOVED TO TOP)
  # ================================================

  validate-env:
    image: bash
    pull_policy: always
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.docker:/root/.docker:ro
    entrypoint: ["/usr/local/bin/bash"]
    command: ["/workspace/scripts/validate_env.sh"]
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DATA_DIR=${DATA_DIR}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://localstack:4566}
      - GUNICORN_PORT=${GUNICORN_PORT:-8888}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-600}
      - MAX_DOCS_PER_UPLOAD=${MAX_DOCS_PER_UPLOAD:-1000}
      - COSMOS_EMBED_GPUS=${COSMOS_EMBED_GPUS:-1}
      - NIM_TRITON_LOG_VERBOSE=${NIM_TRITON_LOG_VERBOSE:-0}
      - MILVUS_CUDA_VISIBLE_DEVICES=${MILVUS_CUDA_VISIBLE_DEVICES:-0}
      - COSMOS_EMBED_NIM_URI=${COSMOS_EMBED_NIM_URI:-http://cosmos-embed:8000}
      - NIM_LOG_LEVEL=${NIM_LOG_LEVEL:-DEFAULT}
      - VISUAL_SEARCH_LOG_LEVEL=${VISUAL_SEARCH_LOG_LEVEL:-DEBUG}
      - ALLOWED_PIPELINES=${ALLOWED_PIPELINES:-cosmos_video_search_milvus}
      - CDS_API_URL=${CDS_API_URL:-http://localhost:8888/v1}
      - CDS_CDN_URL=${CDS_CDN_URL:-http://localhost:4566/cosmos-test-bucket}
      - CDS_UI_URL=${CDS_UI_URL:-http://localhost:8080/}

  # ================================================
  # Infrastructure Services
  # ================================================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID:-test}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY:-test}
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cvds
    depends_on:
      validate-env:
        condition: service_completed_successfully

  milvus:
    container_name: milvus
    image: milvusdb/milvus:v2.4.4-gpu
    command: ["milvus", "run", "standalone"]
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    security_opt:
    - seccomp:unconfined
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID:-test}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY:-test}
      # GPU Memory Management for CAGRA
      - CUDA_VISIBLE_DEVICES=${MILVUS_CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - milvus_data:/var/lib/milvus
      - ./milvus_localstack.yaml:/milvus/configs/milvus.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      localstack:
        condition: service_healthy
      # Ensure cosmos-embed starts first to claim GPU memory before Milvus
      # This prevents GPU memory allocation race conditions that cause
      cosmos-embed:
        condition: service_healthy
    networks:
      - cvds

  cosmos-embed:
    image: ${COSMOS_EMBED_IMAGE:-nvcr.io/nim/nvidia/cosmos-embed1:1.0.0}
    container_name: cosmos-embed
    runtime: nvidia
    # ── expose one GPU in dev; in CI you can stub with 0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${COSMOS_EMBED_GPUS:-1}
              capabilities: [gpu]
    shm_size: 16g
    tmpfs:
      - /tmp/ram:size=2g
    ports:
      - "9000:8000"
      - "9001:8001"
      - "9002:8002"
    volumes:
      - ${HOME}/.cache/nim:/opt/nim/.cache
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY:?err}
      - NIM_TRITON_LOG_VERBOSE=${NIM_TRITON_LOG_VERBOSE:-0}
      - NIM_LOG_LEVEL=${NIM_LOG_LEVEL:-DEFAULT}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
    networks:
      - cvds
    depends_on:
      validate-env:
        condition: service_completed_successfully

  # ================================================
  # Core Services (Built locally)
  # ================================================

  visual-search:
    build:
      context: ../..
      dockerfile: docker/services/visual-search.Dockerfile
    container_name: visual-search
    environment:
      GUNICORN_PORT: ${GUNICORN_PORT:-8888}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-600}
      MAX_DOCS_PER_UPLOAD: ${MAX_DOCS_PER_UPLOAD:-100}
      MILVUS_DOCUMENT_STORE_URI: ${MILVUS_DOCUMENT_STORE_URI:-http://milvus:19530}
      MILVUS_DB: ${MILVUS_DB:-}
      COSMOS_EMBED_NIM_URI: ${COSMOS_EMBED_NIM_URI:-http://cosmos-embed:8000}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      ALLOWED_PIPELINES: ${ALLOWED_PIPELINES:-cosmos_video_search_milvus}
      VISUAL_SEARCH_LOG_LEVEL: ${VISUAL_SEARCH_LOG_LEVEL:-DEBUG}
      # LocalStack S3 configuration for bulk indexing
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      # Map localhost:4566 to localstack:4566 for Docker networking
      LOCALSTACK_HOSTNAME: localstack
    ports:
      - "8888:8888"
    volumes:
      - ../../src/visual_search:/app/src/visual_search
      - ../../src/haystack:/app/src/haystack
      - ../../models:/app/models
    depends_on:
      milvus:
        condition: service_healthy
      cosmos-embed:
        condition: service_healthy
    networks:
      - cvds

  # ================================================
  # User Interface (Built locally)
  # ================================================

  visual-search-react-ui:
    image: ${COSMOS_VDS_WEB_UI_IMAGE:-nvcr.io/nvidia/blueprint/cosmos-cds-ui:1.0.0}
    container_name: cosmos-vds-web-ui
    environment:
      CDS_API_URL: ${CDS_API_URL:-http://localhost:8888/v1}
      CDS_CDN_URL: ${CDS_CDN_URL:-http://localhost:4566/cosmos-test-bucket}
      CDS_UI_URL: ${CDS_UI_URL:-http://localhost:8080/}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      visual-search:
        condition: service_started
    networks:
      - cvds

  localstack:
    image: localstack/localstack:4.7
    container_name: localstack
    ports:
      - "4566:4566"
    volumes:
      - "${DATA_DIR}/:/data:ro"
      - ./localstack/init:/etc/localstack/init/ready.d:ro
    networks:
      - cvds
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:8080
      - EXTRA_CORS_ALLOWED_HEADERS=content-type,x-amz-date,authorization,x-api-key,x-amz-security-token,x-amz-user-agent
      - BUCKET_NAME=cosmos-test-bucket
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls >/dev/null 2>&1 || aws --endpoint-url=http://localhost:4566 s3 ls >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      validate-env:
        condition: service_completed_successfully

# ================================================
# Volumes
# ================================================

volumes:
  milvus_data:
  etcd_data:

# ================================================
# Networks
# ================================================

networks:
  cvds:
    driver: bridge
