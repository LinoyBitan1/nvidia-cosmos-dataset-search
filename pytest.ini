[pytest]
# Pytest configuration for Cosmos Video Dataset Search

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
python_classes = Test*

# Test execution
addopts = 
    -v
    --strict-markers
    --tb=short
    --durations=10
    --color=yes
    -n auto
    --dist loadgroup
    -p no:warnings
    --disable-warnings

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    gpu: GPU tests requiring CUDA
    slow: Slow running tests
    single_concurrency: Tests requiring single concurrency
    skip: Skip tests
    smoke: Smoke tests for basic functionality
    performance: Performance tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_level = INFO

# Warnings
filterwarnings =
    ignore::Warning

# Timeout
timeout = 300

# Coverage
norecursedirs = .git .tox venv env build dist *.egg node_modules