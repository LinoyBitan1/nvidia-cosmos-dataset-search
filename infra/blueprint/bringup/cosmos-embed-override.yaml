# Override values for cosmos-embed to match your cluster setup

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

# Use the latest cosmos-embed image
image:
  repository: nvcr.io/nim/nvidia/cosmos-embed1
  tag: "1.0.0"

# Ensure proper image pull secrets
imagePullSecrets:
  - name: ngc-secret

# Configure for your GPU nodes
nodeSelector:
  role: cvs-gpu

# Tolerations to run on GPU nodes  
tolerations:
  - key: exclusive
    operator: Equal
    value: cvs-gpu
    effect: NoSchedule

# GPU resource allocation - reduced to help with scheduling
resources:
  limits:
    nvidia.com/gpu: 1
    memory: "16Gi"  
    cpu: "2"        
  requests:
    nvidia.com/gpu: 1
    memory: "8Gi"   
    cpu: "1"        

# NIM-specific configurations
nim:
  httpPort: 8000
  nimCache: /opt/nim/.cache
  ngcAPISecret: ngc-api
  modelName: "nvidia/cosmos-embed1"
  logLevel: INFO

# Enable persistence for model cache
persistence:
  enabled: true
  size: 50Gi  # Reduced from 100Gi
  storageClass: high-perf-gp3
  accessMode: ReadWriteOnce

# Configure service to match your port expectations
service:
  type: ClusterIP
  httpPort: 8000
  name: cosmos-embed  # Override default service name to match visual-search expectations

# Environment variables for cosmos-embed
envVars:
  USE_CUDA_IPC: "1"
  ENABLE_CUDA_MPS: "1"
  # NIM_CACHE_PATH: "/opt/nim/.cache" # REMOVED - already set by nim.nimCache

# Extra volumes for performance (equivalent to Docker flags)
# Note: /dev/shm is automatically provided by the NIM chart template
extraVolumes:
  tmp-ram:
    emptyDir:
      medium: Memory
      sizeLimit: 8Gi

extraVolumeMounts:
  tmp-ram:
    mountPath: /tmp/ram

# Increase shared memory size for better performance
# The chart automatically mounts /dev/shm, but we can configure its size
# shmSize: 16Gi  # COMMENTED OUT - causing warning about unknown field

# Health check configurations
startupProbe:
  enabled: true
  path: /v1/health/ready
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 180  # Allow 30 minutes for model download

readinessProbe:
  enabled: true
  path: /v1/health/ready
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe:
  enabled: true
  path: /v1/health/live
  initialDelaySeconds: 60
  periodSeconds: 30
