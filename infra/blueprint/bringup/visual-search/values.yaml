# Default values for visual-search.

replicaCount: 1

imagePullSecret: "nvcr-io"

visualSearch:
  name: "visual-search"
  image:
    repository: "nvcr.io/nvidia/blueprint/cosmos-dataset-search"
    tag: "1.0.0"
  port: 8888
  containerPort: 8888

visualSearchReactUi:
  name: "visual-search-react-ui"

milvus:
  name: "milvus"
  namespace: "default"
  db: "default"
  port: 19530

cosmosEmbed:
  name: "cosmos-embed"
  ports:
    - name: http
      port: 8000
      targetPort: 8000

env:
  MAX_DOCS_PER_UPLOAD: "10000"
  GUNICORN_PORT: "8888"
  GUNICORN_TIMEOUT: "300"
  GUNICORN_WORKERS: "1"
  FASTAPI_ROOT_PATH: "/api"
  NVIDIA_API_KEY: ""

resources:
  requests:
    visualSearchCpu: "500m"

# OpenShift configuration (disabled by default).
# Enabled via values-openshift.yaml overlay.
openshift:
  enabled: false
  route:
    enabled: false
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  scc:
    create: false
    serviceAccountName: "cosmos-cds-sa"
  secrets:
    create: false
    ngcApiKey: ""
    secretsEncryptionKey: ""
  minio:
    route:
      enabled: false
      name: "minio"
      host: ""
    serviceName: "cosmos-cds-minio"
    port: 9000
  nginx:
    enabled: false
    image:
      repository: nginxinc/nginx-unprivileged
      tag: "1.25.3-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 8080
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"
