# Cluster configuration
image:
  all:
    repository: "milvusdb/milvus"
    tag: "v2.4.4-gpu"

minio:
  enabled: false

externalS3:
  enabled: true
  host: "s3.${AWS_REGION}.amazonaws.com"
  port: "443"
  bucketName: "${S3_BUCKET_NAME}"
  useSSL: true
  useIAM: true
  cloudProvider: "aws"
  accessKey: ""
  secretKey: ""
  region: "${AWS_REGION}"

serviceAccount:
  create: false
  name: "s3-access-sa"

# Coordinator Nodes
rootCoordinator:
  enabled: true
  replicas: 1
  activeStandby:
    enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: NotIn
            values: ["milvus-query"]
  resources:
    requests:
      cpu: 0.5
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

indexCoordinator:
  enabled: true
  replicas: 1
  activeStandby:
    enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: NotIn
            values: ["milvus-query"]
  resources:
    requests:
      cpu: "0.25"
      memory: 256Mi
    limits:
      cpu: "0.5"
      memory: 0.5Gi

queryCoordinator:
  enabled: true
  replicas: 1
  activeStandby:
    enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: NotIn
            values: ["milvus-query"]
  resources:
    requests:
      cpu: "0.5"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

dataCoordinator:
  enabled: true
  replicas: 1
  activeStandby:
    enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: NotIn
            values: ["milvus-query"]
  resources:
    limits:
      cpu: "1"
      memory: 8Gi
    requests:
      cpu: "0.5"
      memory: 4Gi

# Proxy Configuration
proxy:
  replicas: 1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: NotIn
            values: ["milvus-query"]
  resources:
    requests:
      cpu: "0.5"
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 4Gi

# Query Node Configuration
queryNode:
  replicas: 1
  image:
    repository: "milvusdb/milvus"
    tag: "v2.4.4"  # CPU version for querynode
  nodeSelector:
    role: milvus-query
    memory-type: high
  tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "querynode"
    effect: "NoExecute"
  resources:
    limits:
      cpu: "15"
      memory: 120Gi
      ephemeral-storage: "150Gi"
    requests:
      cpu: "12"
      memory: 96Gi
      ephemeral-storage: "100Gi"
  extraEnv:
    - name: GOGC
      value: "14"
    - name: GOMEMLIMIT
      value: "110GiB"
    - name: KNOWHERE_ENABLE_GPU
      value: "false"

# Data Node Configuration
dataNode:
  replicas: 1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: NotIn
            values: ["milvus-query"]
  resources:
    requests:
      cpu: 6
      memory: 24Gi
      ephemeral-storage: "40Gi"
    limits:
      cpu: 8
      memory: 31Gi
      ephemeral-storage: "40Gi"
  extraEnv:
    - name: GOGC
      value: "50"
    - name: GOMEMLIMIT
      value: "24GiB"
    - name: MEM_LIMIT
      value: "24Gi"

# Index Node Configuration
indexNode:
  replicas: 1
  nodeSelector:
    role: cvs-gpu
  resources:
    limits:
      cpu: "3500m"
      memory: 12Gi
      nvidia.com/gpu: 1
      ephemeral-storage: "40Gi"
    requests:
      cpu: "3500m"
      memory: 12Gi
      nvidia.com/gpu: 1
      ephemeral-storage: "40Gi"
  extraEnv:
    - name: GOGC
      value: "50"
    - name: GOMEMLIMIT
      value: "12GiB"
    - name: MEM_LIMIT
      value: "12Gi"
    - name: KNOWHERE_ENABLE_GPU
      value: "true"

# Storage Configuration
etcd:
  replicaCount: 1
  autoCompactionMode: revision
  autoCompactionRetention: "1"
  extraEnvVars:
    - name: ETCD_QUOTA_BACKEND_BYTES
      value: "8589934592"
    - name: ETCD_HEARTBEAT_INTERVAL
      value: "500"
    - name: ETCD_ELECTION_TIMEOUT
      value: "25000"
    - name: ETCD_SNAPSHOT_COUNT
      value: "10000"
    - name: ETCD_ENABLE_PPROF
      value: "true"
  persistence:
    accessMode: ReadWriteOnce
    enabled: true
    size: 30Gi  # SSD Required
    storageClass: high-perf-gp3
  resources:
    requests:
      cpu: 2
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi

# Message Queue
pulsar:
  enabled: false
pulsarv3:
  enabled: false

kafka:
  enabled: true
  replicaCount: 3
  image:
    registry: public.ecr.aws
    repository: bitnami/kafka
    tag: 3.7.1
  heapOpts: "-Xmx8192M -Xms8192M"
  resources:
    limits:
      cpu: 2
      memory: 12Gi
      ephemeral-storage: "40Gi"
    requests:
      cpu: 2
      memory: 12Gi
      ephemeral-storage: "40Gi"
  zookeeper:
    image:
      registry: public.ecr.aws
      repository: bitnami/zookeeper
      tag: 3.8.4
    enabled: true
    replicaCount: 1
    heapSize: 2048  # zk heap size in MB
    persistence:
      enabled: true
      storageClass: high-perf-gp3
      accessModes:
        - ReadWriteOnce
      size: 20Gi   # SSD Required
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 1
        memory: 2Gi

# Extra Configurations (Includes segment size)
extraConfigFiles:
  user.yaml: |+
    dataCoord:
      import:
        taskRetention: 1800
    queryCoord:
      memoryUsageMaxDifferencePercentage: 10
    indexNode:
      scheduler:
        buildParallel: 8
    queryNode:
      enableDisk: true
      adapt_for_cpu: true
      mmap:
        vectorField: true
        vectorIndex: true
        scalarField: true
        scalarIndex: true
        growingMmapEnabled: true
    segment:
      maxSize: 4Gi
