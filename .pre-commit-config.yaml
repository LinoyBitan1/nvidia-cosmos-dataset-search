---
exclude: (.*\.patch)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(\.gitlab/.*\.ya?ml$|\.gitlab-ci\.yml$|ci-template\.yml$|src\/visual_search\/wf_templates\/.*|src\/visual_search\/infra\/manifests\/.*\/templates\/.*|infra/blueprint/.*\.ya?ml$)$
      - id: check-added-large-files
        exclude: '^src/visual_search/ui/react/package-lock.json$'
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
  - repo: https://github.com/pycqa/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args: [--remove-unused-variables]
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=120]
  # (TODO) CVML-11: enable pydocstyle
  # - repo: https://github.com/pycqa/pydocstyle
  #   rev: 6.3.0
  #   hooks:
  #     - id: pydocstyle
  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 6.4.0.1
    hooks:
      - id: buildifier
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        "types_or": [c++, c, cuda]
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.4.0
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: go-mod-tidy
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.1
    hooks:
      - id: terraform_fmt
